<!DOCTYPE html>
<html lang="zh">
   <head>
      <title>Avatar Filter</title>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <meta name="robots" content="noindex,nofollow"/>
      <meta name="description" content="Quickly filter avatars."/>
      <link rel="icon" href="https://dev-coco.github.io/images/WebIcon.png">
      <link rel="stylesheet" href="https://dev-coco.github.io/css/site.css">
      <script src="https://dev-coco.github.io/js/love.js" async="async"></script>
      <script src="https://giventofly.github.io/yall/yall.min.js"></script>
      <script>
         var lazyload = new yall();
         window.addEventListener('DOMContentLoaded', (e) => {
           lazyload.run();
         });
      </script>
      <script>
         function copy_id() {
             var get_data = document.getElementsByClassName('select')
             var str = [],i = [];
             for (const x of get_data) {
             i++;
                 if (x.checked == true) {
                     
                     str += document.getElementsByClassName('user_id')[i-1].outerText + "\n";
                 }
             }
             copy(str)
         }
         
         function clean() {
             document.getElementById('content').innerHTML = '';
         }
         
         function create() {
             var input_id = prompt("请输入ID", "");
             var get_id = input_id.match(/.+/g);
             var img_size = document.getElementById('img_size').value;
             var get_content = document.getElementById('content');
             clean();
             var str=[];
             for (var i = 0; i < get_id.length; i++) {
                 str += '<table><tr><td><label style=display:block>' + [i + 1] + '<img style="width:'+img_size+'px;" class="yall_lazy" data-src="https://graph.facebook.com/' + get_id[i] + '/picture?width=720&height=720&access_token=2712477385668128|b429aeb53369951d411e1cae8e810640"> <input class=select type=checkbox><span class=user_id>' + get_id[i] + '</span></label></table>';
             }
             get_content.innerHTML = str;
             lazyload.run();
         }
         
         function copy(str) {
             var input = document.createElement('textarea');
             document.body.appendChild(input);
             input.value = str;
             input.focus();
             input.select();
             document.execCommand('Copy');
             input.remove();
         }
      </script>
      <style>
         img {
             vertical-align: middle;
         }
         span {
             vertical-align: middle;
         }
         #header {
             position: fixed;
             width: 50%;
         }
         #img_size,
         button {
             margin-right: 1rem;
         }
      </style>
   </head>
   <body>
      <h1></h1>
      <div class="img">
         <div id="header">
            <input type="text" style="width:50px;" id="img_size" value="180">
            <button class="button green" onclick="create()">生成</button>
            <button class="button red" onclick="clean()">清空</button>
            <button class="button blue" onclick="copy_id()">复制</button>
         </div>
      </div>
      <div id="content"></div>
   </body>
</html>
