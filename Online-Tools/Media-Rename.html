    <h3 class="my-3">图片视频重命名</h3>
    <div class="box">
      <div class="bg-white rounded-4 p-4 mb-4 border">
        <div class="mb-3">
          <label>Google Sheet 链接</label>
          <input type="text" id="sheetUrlInput" placeholder="请输入 Google Sheet 链接"
            class="form-control w-100 px-3 py-2 rounded-3 custom-input"
            value="https://docs.google.com/spreadsheets/d/1iK9prkiiLWv3LwAU9w9nqwwWu3NEjEdD9ngDP-IMhSU/edit?gid=0#gid=0">
        </div>
        <div id="selectZone">
          <div class="display-5 mb-2">🗂️</div>
          <h4 class="mb-1 fs-6">点击选择文件夹</h4>
          <p class="m-0 small">选择包含图片文件夹与多个视频子文件夹的主目录</p>
        </div>
        <div class="text-center mt-4">
          <button id="startBtn" class="gradient-btn text-white border-0 px-4 py-2 rounded-3 fw-bold"
            disabled>开始智能整理</button>

  <script>
    // 选择的主文件夹
    let rootHandle = null

    const selectZone = document.getElementById('selectZone')
    const startBtn = document.getElementById('startBtn')
    const resetBtn = document.getElementById('resetBtn')
    const logBox = document.getElementById('logBox')
    const sheetUrlInput = document.getElementById('sheetUrlInput')

    // 图片类型后缀
    const imageExt = ['jpg', 'jpeg', 'png', 'webp', 'bmp']
    // 视频类型后缀
    const videoExt = ['mp4', 'mov', 'm4v', 'avi', 'mkv', 'webm']
    // 判断图片文件夹的关键词
    const imageFolderKeyword = ['图片']

    /**
     * @description 写入日志
     * @param {string} msg - 日志内容
     * @param {string} type - 日志类型
     */
    function log(msg, type) {
      const line = document.createElement('div')
      line.className = 'log-box-line ' + (type || '')
      line.textContent = msg
      logBox.appendChild(line)
      // 滚动到最新日志
      logBox.scrollTop = logBox.scrollHeight
    }

    /**
     * @description 获取文件的扩展名
     * @param {string} name - 文件名
     * @returns {string} 扩展名
     */
    function extOf(name) {
      const parts = name.split('.')
      return parts.length > 1 ? parts.pop().toLowerCase() : ''
    }

    /**
     * @description 判断是否是图片文件夹
     * @param {string} name - 文件夹名字
     * @returns {boolean} 判断结果
     */
    function isImageFolderName(name) {
      const lower = name.toLowerCase()
      return imageFolderKeyword.some(k => lower.includes(k.toLowerCase()))
    }

    /**
     * @description 遍历子文件夹获取目录列表
     * @param {FileSystemDirectoryHandle} dirHandle - 系统文件目录
     * @returns {Promise<{dirs: FileSystemDirectoryHandle[], files: FileSystemFileHandle[]}>} 包含目录列表和文件列表的对象
     */
    async function listChildren(dirHandle) {
      const dirs = []
      const files = []
      for await (const [name, handle] of dirHandle.entries()) {
        if (name.startsWith('.')) continue
        if (handle.kind === 'directory') dirs.push(handle)
        else files.push(handle)
      }
      return { dirs, files }
    }

    /**
     * @description 获取文件中的编号
     * @param {string} name - 文件名
     * @returns {number} 编号
     */
    function extractNumber(name) {
      const base = name.replace(/\.[^.]+$/, '')
      const match = base.match(/\d+/)
      return match ? String(parseInt(match[0], 10)) : base
    }

    /**
     * @description 计算图片的哈希
     * @param {ImageBitmap} imgBitmap - 待计算哈希值的图片对象
     * @returns {string} 图片的平均哈希二进制字符串
     */
    function calculateHash(imgBitmap) {
      const canvas = document.createElement('canvas')
      const width = 1080
      const height = 1080
      canvas.width = width
      canvas.height = height
      const ctx = canvas.getContext('2d')
      // 缩放绘制到固定尺寸画布上
      ctx.drawImage(imgBitmap, 0, 0, width, height)
      // 获取像素数据（RGBA）
      const imageData = ctx.getImageData(0, 0, width, height).data

      const grayscaleData = []
      let sum = 0
      // 取 RGB 计算平均灰度
      for (let i = 0; i < imageData.length; i += 4) {
        const r = imageData[i]
        const g = imageData[i + 1]
        const b = imageData[i + 2]
        const grayscale = (r + g + b) / 3
        grayscaleData.push(grayscale)
        sum += grayscale
      }
      // 全图平均灰度值
      const average = sum / grayscaleData.length

      // 每个像素灰度值 >= 平均值记为 '1'，否则记为 '0'，拼接成二进制哈希字符串
      let hash = ''
      for (let i = 0; i < grayscaleData.length; i++) {
        hash += grayscaleData[i] >= average ? '1' : '0'
      }
      return hash
    }

    /**
     * @description 计算图片哈希值相似度比例
     * @param {string} hash1 - 第一个图片哈希值
     * @param {string} hash2 - 第二个图片哈希值
     * @returns {number} 对比相似度
     */
    function calculateHashSimilarity(hash1, hash2) {
      let equalCount = 0
      const len = Math.min(hash1.length, hash2.length)
      for (let i = 0; i < len; i++) {
        if (hash1[i] === hash2[i]) equalCount++
      }
      return (equalCount / len) * 100
    }

    /**
     * @description 提取视频首帧转换成 ImageBitmap
     * @param {File} file - 视频文件
     * @returns {Promise<ImageBitmap|null>} 返回 ImageBitmap
     */
    async function getFirstFrameBitmap(file) {
      return new Promise((resolve, reject) => {
        // 为视频文件创建临时可访问 URL
        const url = URL.createObjectURL(file)
        const video = document.createElement('video')
        video.src = url
        // 静音
        video.muted = true
        video.playsInline = true
        video.preload = 'auto'

        // 加载完视频后，跳转时间点，避免首帧黑屏
        video.addEventListener('loadeddata', () => {
          try {
            video.currentTime = Math.min(0.05, (video.duration || 1) / 10)
          } catch (error) {
            resolve(null)
          }
        })

        // 当前视频帧转换成 ImageBitmap
        video.addEventListener('seeked', async () => {
          try {
            const canvas = document.createElement('canvas')
            canvas.width = video.videoWidth || 320
            canvas.height = video.videoHeight || 240
            const ctx = canvas.getContext('2d')
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height)
            canvas.toBlob(async blob => {
              const bmp = await createImageBitmap(blob)
              // 释放临时 URL 避免内存泄漏
              URL.revokeObjectURL(url)
              resolve(bmp)
            })
          } catch (e) {
            URL.revokeObjectURL(url)
            reject(e)
          }
        })

        // 处理视频加载出错
        video.addEventListener('error', () => {
          URL.revokeObjectURL(url)
          reject(new Error('无法读取视频文件'))
        })
      })
    }

    // 调用浏览器原生文件夹选择器
    selectZone.addEventListener('click', async () => {
      try {
        rootHandle = await window.showDirectoryPicker()
        selectZone.querySelector('h4').textContent = '已选择：' + rootHandle.name
        selectZone.querySelector('p').textContent = '点击可重新选择文件夹'
        startBtn.disabled = false
        log(`已选择主文件夹「${rootHandle.name}」`, 'ok')
      } catch (error) {
        // 未选择文件
        log('未选择文件夹', 'warn')
      }
    })

    // 重置
    resetBtn.addEventListener('click', () => {
      rootHandle = null
      startBtn.disabled = true
      selectZone.querySelector('h4').textContent = '点击选择文件夹'
      selectZone.querySelector('p').textContent = '选择包含图片文件夹与多个视频子文件夹的主目录'
      logBox.innerHTML = ''
    })

    // 点击开始处理按钮，执行主流程
    startBtn.addEventListener('click', async () => {
      const sheetUrl = sheetUrlInput.value.trim()
      if (!sheetUrl) {
        log('请先输入 Google 表格链接', 'err')
        return
      }

      if (!rootHandle) return

      // 禁止重复点击
      startBtn.disabled = true
      // 清空旧日志
      logBox.innerHTML = ''

      try {
        log('正在读取表格数据...')
        const list = await fetch(`https://script.google.com/macros/s/AKfycbyFhw24ONbYiEIw_vfsElqExiryxUGlH1w1H9XmBeK8kjPtIPrvwbYfEc5-VJTaPFIy/exec?sheetUrl=${encodeURIComponent(sheetUrl)}`).then(response => response.json())
        log('表格数据读取完成', 'ok')

        log('开始扫描主文件夹...')
        const { dirs: allDirs } = await listChildren(rootHandle)
        if (allDirs.length === 0) {
          log('主文件夹下没有找到任何子文件夹', 'err')
          startBtn.disabled = false
          return
        }

        const imageDirs = []
        const videoDirs = []
        for (const dir of allDirs) {
          if (isImageFolderName(dir.name)) {
            imageDirs.push(dir)
          } else {
            videoDirs.push(dir)
          }
        }

        if (imageDirs.length === 0) {
          log('没有找到图片文件夹', 'err')
          startBtn.disabled = false
          return
        }

        log(`识别到 ${imageDirs.length} 个图片文件夹，${videoDirs.length} 个视频子文件夹`, 'ok')

        // 收集所有图片文件夹下的图片文件
        const allImages = []
        for (const idir of imageDirs) {
          const { files } = await listChildren(idir)

          const imgs = files.filter(file => imageExt.includes(extOf(file.name)))
          allImages.push(...imgs.map(file => ({ handle: file, name: file.name })))
        }

        // 收集所有视频文件夹下的视频文件
        const allVideoEntries = []
        for (const vdir of videoDirs) {
          const { files } = await listChildren(vdir)
          const videoFiles = files.filter(f => videoExt.includes(extOf(f.name)))
          if (videoFiles.length === 0) {
            log(`文件夹「${vdir.name}」内没有找到视频文件，已跳过`, 'warn')
            continue
          }
          for (const videoFile of videoFiles) {
            allVideoEntries.push({ handle: videoFile, name: videoFile.name, folder: vdir })
          }
        }

        log(`共发现图片 ${allImages.length} 张，视频 ${allVideoEntries.length} 个`, 'ok')

        const listCount = list ? Object.keys(list).length : 0

        // 数量一致性校验
        if (allImages.length !== allVideoEntries.length || allImages.length !== listCount || allVideoEntries.length !== listCount) {
          log(`数量不一致：图片(${allImages.length})、视频(${allVideoEntries.length})、文案(${listCount})，处理已终止，请检查目录内容或表格数据`, 'err')
          startBtn.disabled = false
          return
        }

        // 预先计算所有图片的感知哈希
        log('正在计算图片特征，请稍候...')
        const imageHashes = []
        for (const img of allImages) {
          try {
            const file = await img.handle.getFile()
            const bmp = await createImageBitmap(file)
            const hash = calculateHash(bmp)
            imageHashes.push({ name: img.name, hash })
          } catch (error) {
            log(`读取图片「${img.name}」失败：${error.message}`, 'warn')
          }
        }
        log(`图片特征计算完成，共 ${imageHashes.length} 张`, 'ok')

        // 创建存放视频的文件夹
        const completeDir = await rootHandle.getDirectoryHandle('完成', { create: true })
        // 记录已被匹配使用过的图片避免重复匹配
        const usedImageNames = new Set()
        let totalMatched = 0
        let totalFailed = 0

        // 遍历每个视频，提取首帧并与图片库比对，找出最相似的图片
        for (const vEntry of allVideoEntries) {
          try {
            const file = await vEntry.handle.getFile()
            const frameBmp = await getFirstFrameBitmap(file)
            if (!frameBmp) throw new Error('无法提取视频首帧')
            const frameHash = calculateHash(frameBmp)

            // 优先在未使用的图片中匹配相似度最高的
            let best = null
            let bestSimilarity = -1
            for (const item of imageHashes) {
              if (usedImageNames.has(item.name)) continue
              const sim = calculateHashSimilarity(frameHash, item.hash)
              if (sim > bestSimilarity) {
                bestSimilarity = sim
                best = item
              }
            }

            // 未使用的图片中没有匹配到合适的，从全部图片中重新查找一次
            if (!best) {
              for (const item of imageHashes) {
                const sim = calculateHashSimilarity(frameHash, item.hash)
                if (sim > bestSimilarity) {
                  bestSimilarity = sim
                  best = item
                }
              }
            }

            // 根据匹配到的图片名提取编号
            const newBase = best ? extractNumber(best.name) : extractNumber(vEntry.name)
            const ext = extOf(vEntry.name)
            // 从表格数据中查找该编号对应的文案
            const label = list && list[newBase] ? list[newBase].replace(/\n/g, '') : ''
            // 拼接新文件名
            const newName = label ? `${newBase}、${label}.${ext}` : `${newBase}.${ext}`

            // 将视频重命名后写入文件夹
            const newFileHandle = await completeDir.getFileHandle(newName, { create: true })
            const writable = await newFileHandle.createWritable()
            await writable.write(await file.arrayBuffer())
            await writable.close()

            // 标记图片已被使用
            if (best) usedImageNames.add(best.name)

            log(`「${vEntry.folder.name}/${vEntry.name}」最匹配「${best ? best.name : '无'}」（相似度 ${bestSimilarity.toFixed(2)}%），已重命名为「${newName}」`, 'ok')
            totalMatched++
          } catch (err) {
            log(`处理「${vEntry.folder.name}/${vEntry.name}」时出错：${err.message}`, 'err')
            totalFailed++
          }
        }

        log(`全部处理完成：成功 ${totalMatched} 个，失败 ${totalFailed} 个`, 'ok')
      } catch (err) {
        log('处理过程中发生错误：' + err.message, 'err')
      } finally {
        startBtn.disabled = false
      }
    })
  </script>
