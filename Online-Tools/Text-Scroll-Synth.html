  <script>
// 图片和视频输入框

    const videoContainer = document.getElementById('videoContainer')

    const videoPlaceholder = document.getElementById('videoPlaceholder')
    // 预览文字
    const textInput = document.getElementById('textInput')

    // 视频上的字幕覆盖层
    const textOverlay = document.getElementById('textOverlay')
    // 覆盖层内部显示文字的元素
    const previewText = document.getElementById('previewText')

    // 导出按钮
    const exportBtn = document.getElementById('exportBtn')

    // 字体与样式控制
    const fontFamilySelect = document.getElementById('fontFamily')
    const fontSizeInput = document.getElementById('fontSize')
    const lineSpacingInput = document.getElementById('lineSpacing')
    const textColorSelect = document.getElementById('textColor')

    // 字幕渐隐高度比例
    const fadeHeightInput = document.getElementById('fadeHeight')
    // 字幕渐隐高度比例
    const initialProgressInput = document.getElementById('initialProgress')
    // 正反交替循环
    const pingPongToggle = document.getElementById('pingPongToggle')
    // 绘制视频和字幕
    const canvasPreview = document.getElementById('canvasPreview') // 用于最终帧编码的离屏 Canvas

    // 导出进度条
    const progressContainer = document.getElementById('progressContainer')
    const progressFill = document.getElementById('progressFill')
    const statusText = document.getElementById('statusText')

    // 字幕层交互控件
    const resizeHandle = document.getElementById('resizeHandle')
    const particleEffectSelect = document.getElementById('particleEffect')

    // 拖拽状态
    let dragging = false
    // 缩放状态
    let resizing = false

    // 鼠标起始位置
    let startX, startY
    // 覆盖层初始位置和尺寸
    let initLeft, initTop, initWidth, initHeight

    // 字幕覆盖层位置大小
    const overlaySettings = { left: 10, top: 50, width: 80, height: 40 }

    // 如果上传图片储存 Image，视频默认 null
    let loadedImage = null

    // 远程字体配置表
    const REMOTE_FONTS_CONFIG = {
      Roboto: 'https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap',
      Kavivanar: 'https://fonts.googleapis.com/css2?family=Kavivanar&display=swap',
      'Playwrite NZ Basic': 'https://fonts.googleapis.com/css2?family=Playwrite+NZ+Basic:wght@100..400&display=swap',
      'Shantell Sans': 'https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap',
      'Playpen Sans Thai': 'https://fonts.googleapis.com/css2?family=Playpen+Sans+Thai:wght@100..800&display=swap',
      'Patrick Hand': 'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap',
      'Comic Neue': 'https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap',
      Kalam: 'https://fonts.googleapis.com/css2?family=Kalam&display=swap',
      Caveat: 'https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap',
      Stylish: 'https://fonts.googleapis.com/css2?family=Stylish&display=swap',
      Merienda: 'https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&display=swap',
      Itim: 'https://fonts.googleapis.com/css2?family=Itim&display=swap',
      'Rubik Doodle Shadow': 'https://fonts.googleapis.com/css2?family=Rubik+Doodle+Shadow&display=swap'
    }

    // 粒子类
    class Particle {
      /**
       * @param {number} w - Canvas 宽度（用于边界判断）
       * @param {number} h - Canvas 高度
       * @param {string} type - 粒子类型
       * @param {boolean} isInitial - 是否为初始化阶段
       *   true - 在画布内随机分布
       *   false - 从边缘生成
       */
      constructor (w, h, type, isInitial = false) {
        this.w = w
        this.h = h
        this.type = type

        // 根据粒子类型决定运动方向
        // 上浮、下落或随机方向
        const directionMap = {
          'golden-dust': 'up',
          hearts: 'up',
          balloons: 'up',
          notes: 'up',
          bubbles: 'up',

          sakura: 'down',
          feathers: 'down',
          snowflakes: 'down',
          'sakura-flower': 'down'
        }

        this.direction = directionMap[type] || 'random'

        // 呼吸动画的初始相位随机错开，避免同步闪烁
        this.phase = Math.random() * Math.PI * 2
        this.opacity = 1
        this.reset(isInitial)
      }

      /**
       * @description 重置粒子属性
       * @param {boolean} isInitial - 是否在画布内随机生成
       */
      reset (isInitial = false) {
        // 初始旋转角度
        this.rotation = Math.random() * Math.PI * 2
        // 每帧旋转速度
        this.rotateSpeed = (Math.random() - 0.5) * 0.04

        // 基础尺寸
        this.baseSize = Math.random() * 6 + 4
        this.size = this.baseSize

        // 呼吸动画参数
        this.opacityBase = Math.random() * 0.08 + 0.38
        this.opacityRange = Math.random() * 0.12 + 0.2
        // 呼吸频率
        this.breatheSpeed = Math.random() * 0.18 + 0.22
        // 随呼吸产生的尺寸脉冲幅度
        this.scalePulse = Math.random() * 0.06 + 0.02

        // 水平摇摆参数，模拟飘落和飘升时的自然晃动
        this.swingPhase = Math.random() * Math.PI * 2
        this.swingSpeed = Math.random() * 1.0 + 0.35
        this.swingAmp = Math.random() * 0.8 + 0.2

        // 边缘外的缓冲生成区域
        const spawnPadding = 120
        // 生成区域的纵深范围
        const spawnBand = Math.max(220, this.h * 0.3)

        // 决定粒子的初始坐标
        if (isInitial) {
          // 在整个画布内随机分布，避免画面初始时粒子为空
          this.x = Math.random() * this.w
          this.y = Math.random() * this.h
        } else {
          // 根据运动方向从对应边缘外生成
          if (this.direction === 'up') {
            this.x = Math.random() * this.w
            // 从底部外侧生成
            this.y = this.h + spawnPadding + Math.random() * spawnBand
          } else if (this.direction === 'down') {
            this.x = Math.random() * this.w
            // 从顶部外侧生成
            this.y = -spawnPadding - Math.random() * spawnBand
          } else {
            // 随机方向
            const side = Math.floor(Math.random() * 4)
            if (side === 0) {
              this.x = Math.random() * this.w
              this.y = -spawnPadding - Math.random() * spawnBand
            } else if (side === 1) {
              this.x = this.w + spawnPadding + Math.random() * spawnBand
              this.y = Math.random() * this.h
            } else if (side === 2) {
              this.x = Math.random() * this.w
              this.y = this.h + spawnPadding + Math.random() * spawnBand
            } else {
              this.x = -spawnPadding - Math.random() * spawnBand
              this.y = Math.random() * this.h
            }
          }
        }

        // 各粒子类型的独立配置
        switch (this.type) {
          case 'golden-dust': // 金色斑点
            this.shape = 'circle'
            this.color = '255, 215, 0'
            this.speedY = -(Math.random() * 1.5 + 0.5) // 负值 = 向上
            this.speedX = (Math.random() - 0.5) * 0.5
            this.opacityBase = 0.42
            this.opacityRange = 0.84
            this.breatheSpeed = Math.random() * 0.12 + 0.22
            this.scalePulse = 0.045

          case 'starlight': // 白色五角星
            this.shape = 'star'
            this.color = '255, 255, 255'
            this.speedY = (Math.random() - 0.5) * 0.4
            this.speedX = (Math.random() - 0.5) * 0.4
            this.opacityBase = 0.4
            this.opacityRange = 0.86
            this.breatheSpeed = Math.random() * 0.14 + 0.24
            this.scalePulse = 0.055
            break

          case 'fireflies': // 萤火虫
            this.shape = 'circle'
            this.color = '173, 255, 47'
            this.speedY = (Math.random() - 0.5) * 0.8
            this.speedX = (Math.random() - 0.5) * 0.8
            this.opacityBase = 0.4
            this.opacityRange = 0.86
            this.breatheSpeed = Math.random() * 0.14 + 0.22
            this.scalePulse = 0.05
            break

          case 'sakura': // 樱花花瓣
            this.shape = 'leaf'
            this.color = '255, 183, 197'
            this.speedY = Math.random() * 1.5 + 0.5 // 正值 = 向下
            this.speedX = (Math.random() - 0.2) * 1.0 // 略微偏右飘落
            this.opacityBase = 0.4
            this.opacityRange = 0.84
            this.breatheSpeed = Math.random() * 0.08 + 0.14
            this.scalePulse = 0.02
            break

          case 'sakura-flower': // 樱花花朵
            this.shape = 'flower'
            this.color = '255, 192, 203'
            this.speedY = Math.random() * 1.0 + 0.4
            this.speedX = Math.sin(Math.random()) * 0.8
            this.baseSize = Math.random() * 10 + 10
            this.size = this.baseSize
            this.opacityBase = 0.42
            this.opacityRange = 0.82
            this.breatheSpeed = Math.random() * 0.08 + 0.14
            this.scalePulse = 0.018
            break

          case 'feathers': // 羽毛
            this.shape = 'feather'
            this.color = '255, 255, 255'
            this.speedY = Math.random() * 0.8 + 0.3
            this.speedX = (Math.random() - 0.5) * 0.6
            this.baseSize = Math.random() * 10 + 6
            this.size = this.baseSize
            this.opacityBase = 0.5
            this.opacityRange = 0.8
            this.breatheSpeed = Math.random() * 0.06 + 0.12

          case 'hearts': // 爱心

            this.color = '255, 50, 50'

            this.speedX = (Math.random() - 0.5) * 0.6
            this.opacityBase = 0.44

            this.breatheSpeed = Math.random() * 0.08 + 0.18
            this.scalePulse = 0.03
            break

          case 'snowflakes': // 雪花
            this.shape = 'flake'
            this.color = '200, 240, 255'
            this.speedY = Math.random() * 2.0 + 0.5
            this.speedX = (Math.random() - 0.5) * 1.5
            this.opacityBase = 0.36

          case 'balloons': // 彩色气球
            this.shape = 'circle'

            this.baseSize = Math.random() * 12 + 8
            this.size = this.baseSize
            this.opacityBase = 0.24
            this.opacityRange = 0.48

          case 'pixels': // 像素方块
            this.shape = 'rect'
            this.color = '255,255,255'
            this.speedY = (Math.random() - 0.5) * 1.2
            this.speedX = (Math.random() - 0.5) * 1.2
            this.baseSize = Math.random() * 8 + 4
            this.size = this.baseSize
            this.opacityBase = 0.16
            this.opacityRange = 0.76
            this.breatheSpeed = Math.random() * 0.08 + 0.16
            this.scalePulse = 0.125 // 尺寸脉冲更明显，产生闪烁感
            break

          case 'golden-rays': // 星芒
            this.shape = 'rays'
            this.color = '255, 210, 50'
            this.speedY = (Math.random() - 0.5) * 0.6
            this.speedX = (Math.random() - 0.5) * 0.6
            this.baseSize = Math.random() * 12 + 8
            this.size = this.baseSize
            this.opacityBase = 0.55
            this.opacityRange = 0.35
            this.breatheSpeed = Math.random() * 0.1 + 0.18
            this.scalePulse = 0.08
            this.rotateSpeed = (Math.random() - 0.5) * 0.012 // 缓慢旋转
            break

          default: // 默认向上的白色圆点
            this.shape = 'circle'
            this.color = '255,255,255'
            this.speedY = -(Math.random() * 0.6 + 0.2)
            this.speedX = (Math.random() - 0.5) * 0.2
            break
        }

        this.opacity = this.opacityBase
      }

      /**
       * @description 每帧更新粒子状态
       * @param {number} dt - 时间增量
       */
      update (dt = 1) {
        // 推进呼吸动画和摇摆动画的相位
        this.phase += 0.014 * this.breatheSpeed * dt
        this.swingPhase += 0.012 * this.swingSpeed * dt
        this.rotation += this.rotateSpeed * dt

        // 计算本帧水平漂移量
        const driftX = Math.sin(this.swingPhase) * this.swingAmp * 0.03
        this.y += this.speedY * dt
        this.x += (this.speedX + driftX) * dt

        // 用余弦缓动使 opacity/size 变化更平滑
        const pulse = (Math.sin(this.phase) + 1) / 2
        const eased = 0.5 - 0.5 * Math.cos(pulse * Math.PI)

        this.opacity = this.opacityBase + eased * this.opacityRange
        this.size = this.baseSize * (1 + eased * this.scalePulse)

        // 判断粒子是否已飞出画布边界
        const pad = Math.max(220, this.size * 8)
        const out = this.x < -pad || this.x > this.w + pad || this.y < -pad || this.y > this.h + pad

        if (out) this.reset(false) // 飞出边界后从另一侧边缘重新生成
      }

      /**
       * @description 将粒子绘制到 Canvas 上
       * @param {CanvasRenderingContext2D} ctx
       */
      draw (ctx) {
        ctx.save()
        // 移动原点到粒子位置
        ctx.translate(this.x, this.y)
        ctx.rotate(this.rotation)

        // 限制透明度下限
        const alpha = Math.max(0.22, Math.min(1, this.opacity))
        ctx.globalAlpha = alpha
        ctx.fillStyle = `rgba(${this.color}, ${Math.min(1, alpha * 0.96 + 0.05)})`
        ctx.strokeStyle = `rgba(${this.color}, ${Math.min(1, alpha * 0.97)})`
        // 发光效果半径与粒子尺寸成比例
        ctx.shadowBlur = this.size * 1.0
        ctx.shadowColor = `rgba(${this.color}, ${Math.max(0.35, alpha)})`

        // 羽毛和星芒不需要太强的发光，减弱 shadowBlur
        if (this.shape === 'rays' || this.shape === 'feather') {
          ctx.shadowBlur = this.size * 0.4
        }

        // 根据形状类型调用对应的绘制逻辑
        switch (this.shape) {
          case 'circle': // 实心圆
            ctx.beginPath()
            ctx.arc(0, 0, this.size, 0, Math.PI * 2)
            ctx.fill()
            break

          case 'star': // 五角星
            this.drawStar(ctx, 0, 0, 5, this.size, this.size / 2)
            ctx.fill()
            break

          case 'heart': // 心形
            this.drawHeart(ctx, 0, 0, this.size)
            ctx.fill()
            break

          case 'flower': // 花朵
            this.drawFlower(ctx, 0, 0, 5, this.size)
            ctx.fill()
            break

          case 'leaf': // 叶片/花瓣
            ctx.beginPath()
            ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2)
            ctx.fill()
            break

          case 'feather': // 羽毛
            this.drawFeather(ctx, 0, 0, this.size)
            break

          case 'text': // 文字粒子
            ctx.font = `bold ${this.size}px Arial`
            ctx.fillText(this.text, 0, 0)
            break

          case 'flake': // 雪花
            this.drawStar(ctx, 0, 0, 6, this.size, this.size / 4)
            ctx.lineWidth = 2
            ctx.stroke()
            break

          case 'ring': // 空心圆环
            ctx.beginPath()
            ctx.arc(0, 0, this.size, 0, Math.PI * 2)
            ctx.lineWidth = 2
            ctx.stroke()
            break

          case 'rect': // 方块
            ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size)
            break

          case 'rays': // 星芒
            this.drawRays(ctx, 0, 0, this.size)
            break
        }

        ctx.restore()
      }

      /**
       * @description 绘制多角星形路径
       * @param {number} spikes - 角的数量
       * @param {number} outer - 外半径
       * @param {number} inner - 内半径
       */
      drawStar (ctx, x, y, spikes, outer, inner) {
        // 从顶部开始绘制
        let rot = (Math.PI / 2) * 3
        const step = Math.PI / spikes
        ctx.beginPath()
        ctx.moveTo(x, y - outer)
        for (let i = 0; i < spikes; i++) {
          // 外顶点
          ctx.lineTo(x + Math.cos(rot) * outer, y + Math.sin(rot) * outer)
          rot += step
          // 内凹点
          ctx.lineTo(x + Math.cos(rot) * inner, y + Math.sin(rot) * inner)
          rot += step
        }
        ctx.closePath()
      }

      /**
       * @description 绘制心形路径
       * @param {number} size - 心形尺寸
       */
      drawHeart (ctx, x, y, size) {
        ctx.beginPath()
        ctx.moveTo(x, y + size / 4)
        // 左半心
        ctx.bezierCurveTo(x, y, x - size, y, x - size, y + size / 2)
        ctx.bezierCurveTo(x - size, y + size, x, y + size * 1.5, x, y + size * 1.5)
        // 右半心
        ctx.bezierCurveTo(x, y + size * 1.5, x + size, y + size, x + size, y + size / 2)
        ctx.bezierCurveTo(x + size, y, x, y, x, y + size / 4)
      }

      /**
       * @description 绘制花朵路径
       * @param {number} petals - 花瓣数量
       * @param {number} size - 花朵尺寸
       */
      drawFlower (ctx, x, y, petals, size) {
        ctx.beginPath()
        for (let i = 0; i < petals; i++) {
          ctx.save()
          // 每片花瓣均匀旋转分布
          ctx.rotate((i * 2 * Math.PI) / petals)
          ctx.moveTo(0, 0)
          ctx.bezierCurveTo(-size / 2, -size / 2, -size, size / 4, 0, size)
          ctx.bezierCurveTo(size, size / 4, size / 2, -size / 2, 0, 0)
          ctx.restore()
        }
        ctx.closePath()
      }

      /**
       * @description 绘制羽毛形状
       * @param {number} size - 羽毛基础尺寸
       */
      drawFeather (ctx, x, y, size) {
        // 羽毛总长度
        const len = size * 2.2
        // 羽毛最大宽度
        const width = size * 0.55

        // 外轮廓（羽片）
        ctx.beginPath()
        ctx.moveTo(x, y + len / 2)
        ctx.bezierCurveTo(x - width, y + len * 0.2, x - width * 0.6, y - len * 0.15, x, y - len / 2)
        ctx.bezierCurveTo(x + width * 0.6, y - len * 0.15, x + width, y + len * 0.2, x, y + len / 2)
        ctx.closePath()
        ctx.fill()

        ctx.beginPath()
        ctx.moveTo(x, y + len / 2)
        ctx.quadraticCurveTo(x + size * 0.1, y, x, y - len / 2)
        ctx.lineWidth = size * 0.07
        ctx.globalAlpha = Math.min(1, ctx.globalAlpha * 1.3)
        ctx.stroke()
      }

      /**
       * @description 绘制星芒效果
       * @param {number} size - 光芒基础半径
       */
      drawRays (ctx, x, y, size) {
        const spikes = 8
        // 每条光芒之间的角度间隔
        const step = (Math.PI * 2) / spikes

        // 外层长芒
        ctx.beginPath()
        for (let i = 0; i < spikes; i++) {
          const angle = i * step
          // 芒尖坐标
          const ox = x + Math.cos(angle) * size * 2.2
          const oy = y + Math.sin(angle) * size * 2.2
          // 芒根左侧
          const lx1 = x + Math.cos(angle - 0.12) * size * 0.3
          const ly1 = y + Math.sin(angle - 0.12) * size * 0.3
          // 芒根右侧
          const lx2 = x + Math.cos(angle + 0.12) * size * 0.3
          const ly2 = y + Math.sin(angle + 0.12) * size * 0.3
          ctx.moveTo(lx1, ly1)
          ctx.lineTo(ox, oy)
          ctx.lineTo(lx2, ly2)
          ctx.closePath()
        }
        ctx.fill()

        // 内层短星芒
        // 内层更透明
        ctx.globalAlpha = ctx.globalAlpha * 0.6
        ctx.beginPath()
        for (let i = 0; i < spikes; i++) {
          // 错位半长
          const angle = i * step + step / 2
          const ox = x + Math.cos(angle) * size * 1.2
          const oy = y + Math.sin(angle) * size * 1.2
          const lx1 = x + Math.cos(angle - 0.15) * size * 0.2
          const ly1 = y + Math.sin(angle - 0.15) * size * 0.2
          const lx2 = x + Math.cos(angle + 0.15) * size * 0.2
          const ly2 = y + Math.sin(angle + 0.15) * size * 0.2
          ctx.moveTo(lx1, ly1)
          ctx.lineTo(ox, oy)
          ctx.lineTo(lx2, ly2)
          ctx.closePath()
        }
        ctx.fill()

        // 中心圆核
        // 恢复到内层前的透明度
        ctx.globalAlpha = Math.min(1, ctx.globalAlpha / 0.6)
        ctx.beginPath()
        ctx.arc(x, y, size * 0.28, 0, Math.PI * 2)
        ctx.fill()
      }
    }

    // 粒子预览相关状态
    let previewAnimationFrame
    // 当前预览区域的粒子列表
    let previewParticles = []

    /**
     * @description 动态加载远程字体并确保在 Canvas 中可用
     * @param {string} fontFamily
     */
    async function ensureFontLoaded (fontFamily) {
      const fontUrl = REMOTE_FONTS_CONFIG[fontFamily]
      if (!fontUrl) return // 非远程字体不处理

      const linkId = `font-link-${fontFamily.replace(/\s+/g, '-')}`

      // 加载远程字体
      if (!document.getElementById(linkId)) {
        const link = document.createElement('link')
        link.id = linkId
        link.rel = 'stylesheet'
        link.href = fontUrl
        document.head.appendChild(link)
      }

      // 等待字体激活
      try {
        // 等待字体加载，防止无限阻塞
        await Promise.race([document.fonts.load(`1em ${fontFamily}`), new Promise(resolve => setTimeout(resolve, 5000))])
      } catch (error) {
        console.error(error)
      }
    }

    /**
     * @description 文本自动换行处理
     * @param {CanvasRenderingContext2D} ctx - Canvas 绘图上下文，测量字符宽度
     * @param {string} text - 原始文本内容
     * @param {number} maxWidth - 每一行允许的最大像素宽度
     * @returns {string[]} 按宽度拆分后的文本数组
     */
    function wrapText (ctx, text, maxWidth) {
      // 按换行符拆分原始文本
      const rawLines = text.split(/\r?\n/)
      const lines = []

      for (const raw of rawLines) {
        // 按空白字符拆分为单词
        const words = raw.split(/\s+/).filter(Boolean)
        if (!words.length) {
          lines.push('')
          continue
        }

        let line = ''
        for (const word of words) {
          // 把单词拼接到当前行
          const testLine = line ? `${line} ${word}` : word
          // 测量拼接后的宽度
          const width = ctx.measureText(testLine).width
          if (width > maxWidth && line) {
            // 储存已满行的结果
            lines.push(line)
            // 将当前单词作为新一行的起点
            line = word
          } else {
            // 未超出，继续拼接
            line = testLine
          }
        }
        if (line) lines.push(line)
      }

      return lines
    }

    /**
     * @description 创建预览区域的粒子 Canvas
     * @returns {HTMLCanvasElement}
     */
    function createOrResizePreviewParticleCanvas () {
      let pCanvas = document.getElementById('previewParticleCanvas')
      if (!pCanvas) {
        pCanvas = document.createElement('canvas')
        pCanvas.id = 'previewParticleCanvas'
        pCanvas.style = 'position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;'
        videoContainer.appendChild(pCanvas)
      }

      // 以视频元素的实际渲染尺寸为准
      const videoRect = videoPreview.getBoundingClientRect()
      const containerRect = videoContainer.getBoundingClientRect()
      const width = Math.max(1, Math.round(videoRect.width || containerRect.width))
      const height = Math.max(1, Math.round(videoRect.height || containerRect.height))

      // 设置 canvas 的物理像素尺寸
      pCanvas.width = width
      pCanvas.height = height
      pCanvas.style.width = width + 'px'
      pCanvas.style.height = height + 'px'

      return pCanvas
    }

    // 初始化预览粒子动画
    function initPreviewParticles () {
      const effect = particleEffectSelect.value
      let pCanvas = document.getElementById('previewParticleCanvas')

      if (effect === 'none') {
        if (pCanvas) pCanvas.style.display = 'none'
        cancelAnimationFrame(previewAnimationFrame)
        return
      }

      pCanvas = createOrResizePreviewParticleCanvas()
      pCanvas.style.display = 'block'
      const ctx = pCanvas.getContext('2d')

      // 创建 60 个粒子随机散布
      previewParticles = Array.from({ length: 60 }, () => new Particle(pCanvas.width, pCanvas.height, effect, true))

      let lastTime = 0

      // 使用 requestAnimationFrame 驱动的动画循环
      function animate (timestamp) {
        if (!lastTime) lastTime = timestamp
        // 以 60fps (16.67ms/frame) 为基准，最大 2 倍速
        const dt = Math.min(2, (timestamp - lastTime) / 16.67)
        lastTime = timestamp

        ctx.clearRect(0, 0, pCanvas.width, pCanvas.height)

        previewParticles.forEach(p => {
          p.update(dt)
          p.draw(ctx)
        })

        previewAnimationFrame = requestAnimationFrame(animate)
      }

      // 先停止旧动画，避免多个动画循环并存
      cancelAnimationFrame(previewAnimationFrame)
      previewAnimationFrame = requestAnimationFrame(animate)
    }

    // 视频文件加载事件
    videoInput.addEventListener('change', e => {
      const file = e.target.files[0]
      if (!file) return

      // 生成临时的本地对象 URL
      const url = URL.createObjectURL(file)
      // 判断是图片还是视频
      const isImage = file.type.startsWith('image/')

      if (isImage) {
        // 图片模式
        loadedImage = new Image()
        loadedImage.onload = () => {
          videoPreview.style.display = 'none'
          videoSource.src = ''

          // 动态创图片预览元素
          let imgPreview = document.getElementById('imagePreview')
          if (!imgPreview) {
            imgPreview = document.createElement('img')
            imgPreview.id = 'imagePreview'
            imgPreview.style.cssText = 'width:100%; display:block; border-radius:16px;'
            videoContainer.insertBefore(imgPreview, videoContainer.firstChild)
          }
          imgPreview.src = url
          imgPreview.style.display = 'block'

          // 显示预览区域
          videoContainer.style.display = 'block'
          videoPlaceholder.style.display = 'none'

          // 显示区域

          autoShowOverlay()
          initPreviewParticles()
        }
        loadedImage.src = url
      } else {
        // === 视频模式 ===
        loadedImage = null
        const imgPreview = document.getElementById('imagePreview')
        if (imgPreview) imgPreview.style.display = 'none'
        videoPreview.style.display = 'block'

        // 设置预览与导出视频源
        videoPreview.src = url
        videoSource.src = url

        // 预览静音
        videoPreview.muted = true
        // 允许循环
        videoSource.loop = true

        // 显示区域
        videoContainer.style.display = 'block'
        videoPlaceholder.style.display = 'none'

        videoPreview.onloadedmetadata = () => {
          // 显示字幕覆盖层
          autoShowOverlay()
          initPreviewParticles()
        }

        if (videoPreview.readyState >= 1) {
          autoShowOverlay()
          initPreviewParticles()
        }
      }
    })

    // 音频文件加载事件
    audioInput.addEventListener('change', e => {
      const file = e.target.files[0]
      if (file) audioSource.src = URL.createObjectURL(file)
    })

    // 文本与样式实时更新事件
    textInput.addEventListener('input', syncOverlayText)
    fontSizeInput.addEventListener('input', syncOverlayStyle)
    lineSpacingInput.addEventListener('input', syncOverlayStyle)
    textColorSelect.addEventListener('input', syncOverlayStyle)
    particleEffectSelect.addEventListener('change', initPreviewParticles)

    // 修改字体选择事件，加入异步加载逻辑
    fontFamilySelect.addEventListener('change', async () => {
      const selectedFont = fontFamilySelect.value
      if (REMOTE_FONTS_CONFIG[selectedFont]) await ensureFontLoaded(selectedFont)
      syncOverlayStyle()
    })

    // 窗口缩放时重新适配粒子 Canvas 尺寸
    window.addEventListener('resize', () => {
      if (videoContainer.style.display !== 'none' && particleEffectSelect.value !== 'none') {
        initPreviewParticles()
      }
    })

    // 字幕框拖拽逻辑
    textOverlay.addEventListener('mousedown', e => {
      // 点击缩放点不触发拖拽
      if (e.target === resizeHandle) return

      dragging = true
      const rect = textOverlay.getBoundingClientRect()
      const cRect = videoContainer.getBoundingClientRect()

      // 记录初始位置
      startX = e.clientX
      startY = e.clientY
      initLeft = rect.left - cRect.left
      initTop = rect.top - cRect.top
      e.preventDefault()
    })

    // 字幕缩放逻辑
    resizeHandle.addEventListener('mousedown', e => {
      resizing = true
      const rect = textOverlay.getBoundingClientRect()
      startX = e.clientX
      startY = e.clientY
      initWidth = rect.width
      initHeight = rect.height
      e.stopPropagation()
      e.preventDefault()
    })

    // 全局鼠标移动监听，处理拖拽和缩放的计算
    document.addEventListener('mousemove', e => {
      const cRect = videoContainer.getBoundingClientRect()

      if (dragging) {
        // 计算拖拽位移
        overlaySettings.left = Math.max(0, Math.min(90, ((initLeft + (e.clientX - startX)) / cRect.width) * 100))
        overlaySettings.top = Math.max(0, Math.min(90, ((initTop + (e.clientY - startY)) / cRect.height) * 100))
        textOverlay.style.left = overlaySettings.left + '%'
        textOverlay.style.top = overlaySettings.top + '%'
      } else if (resizing) {
        // 计算缩放尺寸
        overlaySettings.width = Math.max(20, Math.min(100, ((initWidth + (e.clientX - startX)) / cRect.width) * 100))
        overlaySettings.height = Math.max(10, Math.min(100, ((initHeight + (e.clientY - startY)) / cRect.height) * 100))
        textOverlay.style.width = overlaySettings.width + '%'
        textOverlay.style.height = overlaySettings.height + '%'
      }
    })

    // 鼠标释放
    document.addEventListener('mouseup', () => {
      dragging = false
      resizing = false
    })

    // 导出视频
    exportBtn.addEventListener('click', async () => {
      if ((!videoSource.src && !loadedImage) || !audioSource.src || !textInput.value.trim()) {
        alert('请选择媒体文件并输入字幕')
        return
      }

      // 滚动到底部，查看进度条
      setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 100)

      // 确保音频元数据已加载
      if (!audioSource.duration) {
        await new Promise(res => {
          audioSource.onloadedmetadata = () => res()
        })
      }

      exportBtn.disabled = true
      progressContainer.style.display = 'block'
      statusText.textContent = '正在导出，请稍候'

      try {
        if (REMOTE_FONTS_CONFIG[fontFamilySelect.value]) {
          await ensureFontLoaded(fontFamilySelect.value)
        }
        await exportWithLoopedVideoAndAudio(textInput.value.trim())
      } catch (err) {
        console.error(err)
        alert('导出失败')
        exportBtn.disabled = false
        progressContainer.style.display = 'none'
      }
    })

    /**
     * @description 精确跳转视频到指定时间点
     * @param {HTMLVideoElement} video - 需要跳转时间的视频元素
     * @param {number} time - 目标时间
     * @returns {Promise<void>} 在视频触发 seeked 事件后解析
     */
    async function waitForVideoSeek (video, time) {
      return new Promise(resolve => {
        const onSeeked = () => {
          video.removeEventListener('seeked', onSeeked)
          resolve()
        }
        video.addEventListener('seeked', onSeeked, { once: true })
        video.currentTime = time
      })
    }

    /**
     * @description 视频合成
     * @param {string} text - 滚动字幕文本
     */
    async function exportWithLoopedVideoAndAudio (text) {
      // 获取 canvas 绘图上下文
      const canvas = canvasPreview
      const ctx = canvas.getContext('2d', { willReadFrequently: true })

      const isImageMode = !!loadedImage

      if (isImageMode) {
        canvas.width = loadedImage.naturalWidth
        canvas.height = loadedImage.naturalHeight
      } else {
        // 等待视频元数据
        if (!videoSource.videoWidth) {
          await new Promise(res => {
            videoSource.onloadedmetadata = () => res()
          })
        }
        canvas.width = videoSource.videoWidth
        canvas.height = videoSource.videoHeight
      }

      // 初始化 WebMMuxer
      const muxer = new WebMMuxer.Muxer({
        target: new WebMMuxer.ArrayBufferTarget(), // 输出到内存 ArrayBuffer
        video: { codec: 'V_VP9', width: canvas.width, height: canvas.height, frameRate: 30 },
        audio: { codec: 'A_OPUS', sampleRate: 48000, numberOfChannels: 2 }
      })

      // 初始化视频编码器
      const videoEncoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta), // 编码完的帧直接送入 muxer
        error: e => console.error(e)
      })
      videoEncoder.configure({
        codec: 'vp09.00.10.08',
        width: canvas.width,
        height: canvas.height,
        bitrate: 6e6 // 6 Mbps
      })

      // 解码音频文件
      const audioCtx = new AudioContext({ sampleRate: 48000 })
      const audioResp = await fetch(audioSource.src)
      const audioBuf = await audioCtx.decodeAudioData(await audioResp.arrayBuffer())

      // 始化音频编码器
      const audioEncoder = new AudioEncoder({
        output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
        error: e => console.error(e)
      })
      audioEncoder.configure({
        codec: 'opus',
        numberOfChannels: audioBuf.numberOfChannels,
        sampleRate: 48000,
        bitrate: 128000
      })

      // 将音频 PCM 数据编码为 Opus
      const sampleRate = 48000
      const nch = audioBuf.numberOfChannels

      for (let i = 0; i < audioBuf.length; i += sampleRate) {
        const chunkLen = Math.min(sampleRate, audioBuf.length - i)
        // 将多声道平面数据
        const interleaved = new Float32Array(chunkLen * nch)
        for (let c = 0; c < nch; c++) {
          const cd = audioBuf.getChannelData(c)
          for (let j = 0; j < chunkLen; j++) {
            interleaved[j * nch + c] = cd[i + j]
          }
        }

        const ad = new AudioData({
          format: 'f32',
          sampleRate,
          numberOfFrames: chunkLen,
          numberOfChannels: nch,
          timestamp: (i / sampleRate) * 1e6,
          data: interleaved
        })
        audioEncoder.encode(ad)
        ad.close()
      }

      // 计算字幕滚动参数
      const fs = parseInt(fontSizeInput.value) * (canvas.width / 900)
      ctx.font = `bold ${fs}px ${fontFamilySelect.value}`

      // 字幕区域在 canvas 上的绝对坐标
      const rect = {
        x: (overlaySettings.left / 100) * canvas.width,
        y: (overlaySettings.top / 100) * canvas.height,
        w: (overlaySettings.width / 100) * canvas.width,
        h: (overlaySettings.height / 100) * canvas.height
      }

      // 换行后的行数组
      const lines = wrapText(ctx, text, rect.w - fs)
      // 行高
      const lh = fs * (parseFloat(lineSpacingInput.value) || 1.8)
      // 文字总高度 + 区域高度
      const totalH = lines.length * lh + rect.h
      // 实际滚动距离
      const dist = totalH * (2 / 3)
      // 初始偏移量
      const offset = (parseFloat(initialProgressInput.value) / 100) * dist

      // 初始化粒子
      const effect = particleEffectSelect.value
      const particleCount = effect === 'none' ? 0 : 160 // 粒子数量
      const particles = effect !== 'none' ? Array.from({ length: particleCount }, () => new Particle(canvas.width, canvas.height, effect, true)) : []

      // 逐帧渲染并编码
      const fps = 30
      // 总帧数由音频时长决定
      const totalFrames = Math.floor(audioBuf.duration * fps)
      // 上下淡出区域比例
      const fadeRatio = Math.max(0.05, Math.min(0.5, parseFloat(fadeHeightInput.value) / 100))
      const videoDuration = isImageMode ? Infinity : videoSource.duration || 1

      for (let f = 0; f < totalFrames; f++) {
        // 当前帧对应的时间
        const ct = f / fps

        ctx.clearRect(0, 0, canvas.width, canvas.height)

        // 绘制背景
        if (isImageMode) {
          ctx.drawImage(loadedImage, 0, 0, canvas.width, canvas.height)
        } else {
          // 视频循环
          const segTime = ct % videoDuration
          let currentVideoTime = segTime
          // 正反交替循环
          if (pingPongToggle.checked && Math.floor(ct / videoDuration) % 2 === 1) {
            currentVideoTime = Math.max(0, videoDuration - segTime)
          }
          // 精确跳帧
          await waitForVideoSeek(videoSource, currentVideoTime)
          ctx.drawImage(videoSource, 0, 0, canvas.width, canvas.height)
        }

        // 绘制粒子特效层
        if (effect !== 'none') {
          particles.forEach(p => {
            p.update(1)
            p.draw(ctx)
          })
        }

        // 绘制滚动字幕
        ctx.save()
        ctx.beginPath()
        ctx.rect(rect.x, rect.y, rect.w, rect.h)
        // 裁剪到字幕区域，超出部分不显示
        ctx.clip()

        ctx.font = `bold ${fs}px ${fontFamilySelect.value}`
        ctx.textAlign = 'center'
        ctx.fillStyle = textColorSelect.value
        ctx.shadowBlur = 4
        // 文字描边和阴影
        ctx.shadowColor = 'rgba(0,0,0,0.8)'

        // 计算当前帧字幕的起始 Y 坐标
        // 初始位置 + 区域高度 - (初始偏移 + 本帧滚动量)
        const sy = rect.y + rect.h - (offset + (dist / audioBuf.duration) * ct)

        lines.forEach((l, i) => {
          // 每行文字的 Y 坐标
          const y = sy + i * lh

          // 计算上下淡出透明度
          const topFade = rect.h * fadeRatio
          const bottomFade = rect.h * fadeRatio
          // 距顶部边缘的比例
          const alphaTop = topFade > 0 ? (y - rect.y) / topFade : 1
          // 距底部边缘的比例
          const alphaBottom = bottomFade > 0 ? (rect.y + rect.h - y) / bottomFade : 1
          // 取最小值
          const alpha = Math.min(1, alphaTop, alphaBottom)

          if (alpha > 0) {
            ctx.save()
            ctx.globalAlpha = Math.max(0, alpha)
            ctx.fillText(l, rect.x + rect.w / 2, y)
            ctx.restore()
          }
        })

        ctx.restore()

        // 将当前 canvas 内容封装为 VideoFrame 并送入编码器
        const vframe = new VideoFrame(canvas, { timestamp: ct * 1e6 })
        videoEncoder.encode(vframe)
        vframe.close()

        // 每 10 帧更新一次进度条
        if (f % 10 === 0 || f === totalFrames - 1) {
          const p = Math.round((f / totalFrames) * 100)
          progressFill.style.width = p + '%'
          progressFill.textContent = p + '%'
          if (isImageMode) await new Promise(resolve => setTimeout(resolve, 0))
        }
      }

      // 等待编码器清空缓冲区
      await videoEncoder.flush()
      await audioEncoder.flush()
      // 将所有编码数据写入 WebM 容器
      muxer.finalize()

      // 触发浏览器下载
      const a = document.createElement('a')
      a.href = URL.createObjectURL(new Blob([muxer.target.buffer], { type: 'video/webm' }))
      a.download = 'video_' + Date.now() + '.webm'
      a.click()

      progressContainer.style.display = 'none'
      exportBtn.disabled = false
      alert('完成')
    }
  </script>
</body>
</html>
